<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings - Crop Doctor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="min-h-screen bg-[#59cc49] font-[Inter]">
    <div class="p-6">
        <div class="max-w-5xl mx-auto bg-white rounded-2xl shadow-2xl overflow-hidden">
            <div class="bg-white border-b border-gray-100 p-8 shadow-sm">
                <div class="text-center mb-8">
                    <h1 class="text-4xl font-black text-gray-800 inline-flex items-center gap-3">
                        <span class="text-5xl">📅</span> My Consultations
                    </h1>
                </div>

                <nav class="flex flex-wrap items-center justify-between gap-4 pt-6 border-t border-gray-50">
                    <div class="flex gap-4">
                        <a href="/"
                            class="px-5 py-2 rounded-xl text-gray-600 hover:text-purple-600 font-bold transition-all hover:bg-purple-50">Home</a>
                        <a href="/experts"
                            class="px-5 py-2 rounded-xl text-gray-600 hover:text-purple-600 font-bold transition-all hover:bg-purple-50">Find
                            Experts</a>
                    </div>

                    <div class="flex items-center gap-4">
                        {% if current_user.is_authenticated %}
                        <span class="text-sm font-semibold text-gray-400">Welcome, <span
                                class="text-gray-900 capitalize">{{ current_user.username }}</span></span>
                        <a href="/logout"
                            class="bg-red-50 text-red-600 px-5 py-2 rounded-xl font-bold hover:bg-red-100 transition-all">Logout</a>
                        {% else %}
                        <a href="/login"
                            class="bg-purple-600 text-white px-6 py-2 rounded-xl font-bold hover:bg-purple-700 transition-all shadow-md">Login</a>
                        {% endif %}
                    </div>
                </nav>
            </div>

            <div class="p-8">
                <div id="bookings-container" class="space-y-6">
                    <!-- Loading state -->
                    <div class="animate-pulse space-y-4">
                        <div class="h-24 bg-gray-100 rounded-2xl"></div>
                        <div class="h-24 bg-gray-100 rounded-2xl"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function loadBookings() {
            try {
                const response = await fetch('/api/experts/bookings');
                const data = await response.json();
                const container = document.getElementById('bookings-container');

                if (!data.bookings || data.bookings.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-20 bg-gray-50 rounded-3xl border-2 border-dashed border-gray-200">
                            <span class="text-6xl mb-4 block">🏜️</span>
                            <h3 class="text-2xl font-bold text-gray-800 mb-2">No bookings found</h3>
                            <p class="text-gray-500 mb-8">You haven't scheduled any consultations yet.</p>
                            <a href="/experts" class="bg-purple-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-purple-700 transition-all">
                                Browse Experts
                            </a>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = data.bookings.map(b => `
                    <div class="bg-white border border-gray-100 p-6 rounded-2xl shadow-sm hover:shadow-md transition-all flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                        <div class="flex items-center gap-6">
                            <div class="w-16 h-16 bg-purple-50 rounded-2xl flex items-center justify-center text-3xl">👨‍🔬</div>
                            <div>
                                <h3 class="font-extrabold text-gray-900 text-lg">${b.expert.user.full_name || b.expert.user.username}</h3>
                                <p class="text-purple-600 font-semibold text-sm mb-1">${b.expert.specializations.join(', ')}</p>
                                <div class="flex gap-4 text-xs font-bold text-gray-400">
                                    <span class="flex items-center gap-1">🕒 ${b.booking_date} at ${b.start_time}</span>
                                    <span class="flex items-center gap-1 capitalize">💻 ${b.mode}</span>
                                </div>
                            </div>
                        </div>

                        <div class="flex items-center gap-4 w-full md:w-auto">
                            <div class="flex-1 md:flex-none text-right">
                                <span class="px-4 py-1.5 rounded-full text-xs font-extra-bold uppercase tracking-wider 
                                    ${b.status === 'confirmed' ? 'bg-green-100 text-green-700' :
                        b.status === 'pending' ? 'bg-yellow-100 text-yellow-700' : 'bg-gray-100 text-gray-700'}">
                                    ${b.status}
                                </span>
                            </div>
                            <button onclick="viewBooking(${b.id})" 
                                class="px-6 py-2 border-2 border-purple-50 hover:bg-purple-50 text-purple-600 font-bold rounded-xl transition-all">
                                Details
                            </button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('bookings-container').innerHTML = `
                    <div class="p-8 text-center bg-red-50 text-red-600 rounded-2xl border border-red-100">
                        Failed to load bookings. Please ensure you are logged in.
                    </div>
                `;
            }
        }

        async function viewBooking(id) {
            try {
                const response = await fetch(`/api/experts/bookings/${id}`);
                const b = await response.json();

                if (b.error) {
                    alert(b.error);
                    return;
                }

                // Identify if current user is the Expert or the Farmer
                // Current farmer sees "Welcome, [username]" in nav. 
                // We'll rely on checking if current user matches farmer.name
                const isFarmer = '{{ current_user.full_name }}' === b.farmer.name || '{{ current_user.username }}' === b.farmer.name;
                const isExpert = !isFarmer;

                const modalHtml = `
                <div id="booking-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-gray-900/50 backdrop-blur-sm transition-opacity">
                    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden transform transition-all">
                        <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                            <h2 class="text-xl font-black text-gray-800 flex items-center gap-2">
                                📋 Consultation Details
                            </h2>
                            <button onclick="document.getElementById('booking-modal').remove()" class="text-gray-400 hover:text-red-500 transition-colors">
                                <span class="text-2xl">&times;</span>
                            </button>
                        </div>
                        
                        <div class="p-6 space-y-4">
                            <div class="flex justify-between items-start">
                                <div>
                                    <p class="text-sm text-gray-500 font-bold mb-1">${isExpert ? 'Farmer' : 'Expert'}</p>
                                    <p class="text-lg font-bold text-gray-900">${isExpert ? b.farmer.name : 'Dr. ' + (b.expert.name || '')}</p>
                                </div>
                                <div class="text-right">
                                    <span class="px-3 py-1 rounded-full text-xs font-extra-bold uppercase tracking-wider 
                                        ${b.status === 'confirmed' ? 'bg-green-100 text-green-700' :
                        b.status === 'pending' ? 'bg-yellow-100 text-yellow-700' : 'bg-gray-100 text-gray-700'}">
                                        ${b.status}
                                    </span>
                                </div>
                            </div>

                            <div class="p-4 bg-purple-50 rounded-xl space-y-2 border border-purple-100">
                                <div class="flex items-center gap-3">
                                    <span class="text-xl">🕒</span>
                                    <p class="text-sm font-bold text-gray-800">${b.booking_date} | ${b.start_time} - ${b.end_time}</p>
                                </div>
                                <div class="flex items-center gap-3">
                                    <span class="text-xl">💻</span>
                                    <p class="text-sm font-bold text-gray-800 capitalize">${b.mode} Session</p>
                                </div>
                                <div class="flex items-center gap-3">
                                    <span class="text-xl">💰</span>
                                    <p class="text-sm font-bold text-gray-800">KSh ${b.payment_amount} 
                                        <span class="text-xs ${b.payment_status === 'paid' ? 'text-green-600 bg-green-100' : 'text-yellow-600 bg-yellow-100'} px-2 py-0.5 rounded-md font-bold uppercase ml-2 shadow-sm">
                                            ${b.payment_status || 'Pending'}
                                        </span>
                                    </p>
                                </div>
                            </div>
                            
                            <div>
                                <p class="text-sm text-gray-500 font-bold mb-1">Crop & Urgency</p>
                                <p class="text-gray-800 font-medium">${b.crop_type || 'Not specified'} 
                                    <span class="text-xs ml-2 px-2 py-0.5 rounded-full ${b.urgency === 'high' ? 'bg-red-100 text-red-700' : 'bg-blue-100 text-blue-700'}">${b.urgency || 'medium'}</span>
                                </p>
                            </div>

                            <div>
                                <p class="text-sm text-gray-500 font-bold mb-1">Issue Description</p>
                                <p class="text-gray-800 text-sm bg-gray-50 p-3 rounded-xl border border-gray-100">
                                    ${b.issue_description || 'No specific details provided by the farmer.'}
                                </p>
                            </div>
                            
                            ${b.expert_notes ? `
                            <div>
                                <p class="text-sm text-purple-600 font-bold mb-1">Expert Notes</p>
                                <p class="text-gray-800 text-sm bg-purple-50 p-3 rounded-xl border border-purple-100">
                                    ${b.expert_notes}
                                </p>
                            </div>` : ''}

                        </div>

                        <div class="p-6 border-t border-gray-100 bg-gray-50 flex gap-3 justify-end items-center flex-wrap">
                            
                            <!-- EXPERT ACTIONS -->
                            ${isExpert ? `
                                ${b.status === 'pending' ? `
                                    <button onclick="updateBookingStatus(${b.id}, 'confirmed')" class="px-5 py-2 bg-green-500 hover:bg-green-600 text-white font-bold rounded-xl transition-all shadow-sm">
                                        Accept Booking
                                    </button>
                                    <button onclick="updateBookingStatus(${b.id}, 'cancelled')" class="px-5 py-2 bg-red-50 hover:bg-red-100 text-red-600 font-bold rounded-xl transition-all">
                                        Decline
                                    </button>
                                ` : ''}
                                ${b.status === 'confirmed' ? `
                                    <button onclick="updateBookingStatus(${b.id}, 'completed')" class="px-5 py-2 bg-purple-600 hover:bg-purple-700 text-white font-bold rounded-xl transition-all shadow-sm">
                                        Mark Completed
                                    </button>
                                    <a href="https://meet.google.com/new" target="_blank" class="px-5 py-2 bg-blue-500 hover:bg-blue-600 text-white font-bold rounded-xl transition-all shadow-sm">
                                        Join Video Call
                                    </a>
                                ` : ''}
                            ` : ''}

                            <!-- FARMER ACTIONS -->
                            ${isFarmer ? `
                                ${b.payment_status !== 'paid' && b.status !== 'cancelled' ? `
                                    <button id="pay-btn-${b.id}" onclick="processPayment(${b.id})" class="px-5 py-2 bg-green-600 hover:bg-green-700 text-white font-bold rounded-xl transition-all shadow-xl animate-pulse">
                                        💳 Pay KSh ${b.payment_amount} Now
                                    </button>
                                ` : ''}
                                ${b.status === 'confirmed' && b.payment_status === 'paid' ? `
                                    <a href="https://meet.google.com/new" target="_blank" class="px-5 py-2 bg-blue-500 hover:bg-blue-600 text-white font-bold rounded-xl transition-all shadow-sm">
                                        Join Video Call
                                    </a>
                                ` : ''}
                            ` : ''}
                            
                            <button onclick="document.getElementById('booking-modal').remove()" class="px-5 py-2 border border-gray-200 hover:bg-white text-gray-600 font-bold rounded-xl transition-all">
                                Close
                            </button>
                        </div>
                    </div>
                </div>
                `;
                document.body.insertAdjacentHTML('beforeend', modalHtml);

            } catch (error) {
                console.error('Error fetching details:', error);
                alert("Could not load consultation details.");
            }
        }

        async function processPayment(id) {
            const btn = document.getElementById(`pay-btn-${id}`);
            const originalText = btn.innerHTML;
            btn.innerHTML = '⚙️ Processing...';
            btn.disabled = true;

            try {
                // First simulate a 1.5s delay like real gateways (Stripe/Mpesa)
                await new Promise(r => setTimeout(r, 1500));

                const response = await fetch(`/api/experts/bookings/${id}/pay`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                if (response.ok) {
                    // Success! Remove the modal immediately and refresh list to show newly paid status
                    document.getElementById('booking-modal').remove();
                    // Optional nice flair
                    alert("✅ Payment Successful! Your consultation is secured.");
                    loadBookings();
                } else {
                    const data = await response.json();
                    alert(data.error || 'Payment failed.');
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Connection error during payment');
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        async function updateBookingStatus(id, newStatus) {
            try {
                const response = await fetch(`/api/experts/bookings/${id}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });

                if (response.ok) {
                    document.getElementById('booking-modal').remove();
                    loadBookings(); // Refresh the list
                } else {
                    const data = await response.json();
                    alert(data.error || 'Failed to update status');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Connection error');
            }
        }

        loadBookings();
    </script>
</body>

</html>
